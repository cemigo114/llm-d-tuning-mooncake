apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gptoss-gateway
  namespace: kpouget-dev
  annotations:
    networking.istio.io/service-type: ClusterIP
spec:
  gatewayClassName: istio
  listeners:
    - name: default
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
